# Site-wide settings
# ------------------
title: António Nunes's academic page
author:
  name: António Nunes
  email: antonio.w.nunes@tecnico.ulisboa.pt
description: CV, academic projects, and publications.

github_username: antoniownunes

# Build settings
# --------------
remote_theme: jekyll/minima

plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Minima-specific settings (applicable to Minima v3 and above only)
# -----------------------------------------------------------------
minima:
  skin: auto
  hide_site_feed_link: true
  nav_pages:
    - about.md
    - projects.md
    - publications.md